name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.vfs.watch=false

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clear Gradle Cache (Recommended for Module Initialization Errors)
        run: |
          rm -rf ~/.gradle/wrapper
          rm -rf ~/.gradle/caches
        shell: bash

      - name: Build Android Release
        run: |
          set -euo pipefail
          retry() {
            local n=1 max=3 delay=5
            while true; do
              echo "Attempt #$n: $*"
              "$@" && break
              [ $n -ge $max ] && { echo "Failed after $n attempts."; return 1; }
              n=$((n+1)); echo "Retrying in ${delay}s..."; sleep $delay; delay=$((delay*2))
            done
          }
          retry ./gradlew assembleRelease
        shell: bash

      - name: Sign Android Release
        if: github.event_name != 'pull_request'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-signed-apks
          path: app/build/outputs/apk/release/*-signed.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Unsigned APKs (For Debugging)
        uses: actions/upload-artifact@v4
        with:
          name: android-unsigned-apks
          path: app/build/outputs/apk/release/*-unsigned.apk
          retention-days: 7

  # Placeholder Desktop Builds (Require :composeApp module)
  # These are added to maintain "Everything" from the reference script.
  # build-windows: ...
  # build-macos: ...
  # build-linux: ...

  release:
    name: Draft Release with all Installers
    needs: [build-android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Project Version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep 'projectVersionName' gradle/libs.versions.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not read projectVersionName from gradle/libs.versions.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: v$VERSION"
        shell: bash

      - name: Download all Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage Release Files (Collision-Resistant)
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release-files

          echo "=== Downloaded artifact tree ==="
          find artifacts -maxdepth 4 -type f 2>/dev/null | sort
          echo

          stage() {
            local src="$1"
            local target_name="$2"
            if [ -f "$src" ]; then
              cp "$src" "release-files/$target_name"
              echo "Staged: $target_name"
              return 0
            fi
            return 1
          }

          android_count=0
          
          # Android APKs
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            stage "$f" "$(basename "$f")" && android_count=$((android_count + 1)) || true
          done < <(find artifacts/android-signed-apks -type f -name '*-signed.apk' 2>/dev/null)

          echo
          echo "Final staged files:"
          ls -la release-files/
          echo
          echo "Per-group counts: android=$android_count"

          # Completeness Guard
          missing=()
          [ "$android_count" -eq 0 ] && missing+=("Android Signed APKs")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: missing artifacts for the following groups:"
            printf "  - %s\n" "${missing[@]}"
            exit 1
          fi
        shell: bash

      - name: Create or Update Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft=$(gh release view "$TAG" --json isDraft -q '.isDraft')
            if [ "$is_draft" = "true" ]; then
              echo "Draft release $TAG already exists — replacing assets via --clobber..."
              gh release upload "$TAG" release-files/* --clobber
            else
              echo "ERROR: release $TAG is already PUBLISHED. Refusing to overwrite."
              exit 1
            fi
          else
            echo "Creating new draft release $TAG..."
            gh release create "$TAG" \
              --draft \
              --title "v$VERSION" \
              --generate-notes \
              release-files/*
          fi
        shell: bash
